services:
  - type: web
    name: invoiceiq
    runtime: python
    plan: starter
    region: oregon
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn run:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: invoiceiq-db
          property: connectionString
      - key: CONFIG_DIR
        value: /var/data/config
      - key: STORAGE_PATH
        value: /var/data/invoices
      - key: PYTHON_VERSION
        value: 3.12.2
    disk:
      name: invoiceiq-data
      mountPath: /var/data
      sizeGB: 5

databases:
  - name: invoiceiq-db
    plan: basic-1gb
    databaseName: invoiceiq
    user: invoiceiq
