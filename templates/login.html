<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jasmitan Invoice — Sign In</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/app.css') }}" rel="stylesheet">
</head>
<body class="login-body">
  <div class="login-card">
    <div class="login-logo">
      <svg width="36" height="36" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="30" height="30" rx="7" fill="white" fill-opacity="0.15"/>
        <rect x="6" y="8"  width="18" height="2.5" rx="1.25" fill="white"/>
        <rect x="6" y="13" width="13" height="2.5" rx="1.25" fill="rgba(255,255,255,0.75)"/>
        <rect x="6" y="18" width="9"  height="2.5" rx="1.25" fill="rgba(255,255,255,0.5)"/>
      </svg>
    </div>
    <h4 class="fw-bold mb-1">Jasmitan Invoice</h4>
    <p class="text-muted mb-4">Accounts Payable · {{ finance_system_name }}</p>

    {% if error %}
    <div class="alert alert-danger small py-2">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('login') }}">
      <div class="mb-3 text-start">
        <label class="form-label fw-semibold small">Email</label>
        <input type="email" class="form-control" name="email" autocomplete="email" placeholder="you@company.com"
               value="{{ request.form.get('email', '') }}" required autofocus>
      </div>
      <div class="mb-3 text-start">
        <label class="form-label fw-semibold small">Password</label>
        <input type="password" class="form-control" name="password" autocomplete="current-password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">
        Sign In <i class="bi bi-arrow-right ms-1"></i>
      </button>
      <div class="mt-3">
        <a href="{{ url_for('forgot_password') }}" class="small text-decoration-none">Forgot password?</a>
      </div>
    </form>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
