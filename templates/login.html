<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invoice-IQ — Sign In</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="icon" href="{{ url_for('static', filename='favicon.svg') }}" type="image/svg+xml">
  <link href="{{ url_for('static', filename='css/app.css') }}" rel="stylesheet">
</head>
<body class="login-body">
  <div class="login-card">
    <div class="login-logo">
      <svg width="38" height="38" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs><linearGradient id="login-sun" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFC24B"/><stop offset="100%" stop-color="#E8722C"/></linearGradient></defs>
        <line x1="3" y1="30" x2="37" y2="30" stroke="#171A2B" stroke-width="2.4" stroke-linecap="round"/>
        <path d="M8 30a12 12 0 0 1 24 0" fill="url(#login-sun)"/>
        <g stroke="#F5A623" stroke-width="2.2" stroke-linecap="round"><line x1="20" y1="4" x2="20" y2="11"/><line x1="6" y1="12" x2="10.5" y2="15.5"/><line x1="34" y1="12" x2="29.5" y2="15.5"/></g>
      </svg>
    </div>
    <h4 class="fw-bold mb-1" style="font-family:'Bricolage Grotesque','Inter',sans-serif;">Invoice<span style="color:#E8722C">-IQ</span></h4>
    <p class="text-muted mb-4">Accounts Payable · {{ finance_system_name }}</p>

    {% if error %}
    <div class="alert alert-danger small py-2">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('login') }}">
      <div class="mb-3 text-start">
        <label class="form-label fw-semibold small">Email</label>
        <input type="email" class="form-control" name="email" autocomplete="email" placeholder="you@company.com"
               value="{{ request.form.get('email', '') }}" required autofocus>
      </div>
      <div class="mb-3 text-start">
        <label class="form-label fw-semibold small">Password</label>
        <input type="password" class="form-control" name="password" autocomplete="current-password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">
        Sign In <i class="bi bi-arrow-right ms-1"></i>
      </button>
      <div class="mt-3">
        <a href="{{ url_for('forgot_password') }}" class="small text-decoration-none">Forgot password?</a>
      </div>
    </form>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
