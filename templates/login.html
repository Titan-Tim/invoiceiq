<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invoice-IQ — Sign In</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="icon" href="{{ url_for('static', filename='favicon.svg') }}" type="image/svg+xml">
  <link href="{{ url_for('static', filename='css/app.css') }}" rel="stylesheet">
</head>
<body class="login-body">
  <div class="login-card">
    <div class="login-logo">
      <i class="bi bi-receipt text-white"></i>
    </div>
    <h4 class="fw-bold mb-1" style="font-family:'Bricolage Grotesque','Inter',sans-serif;">Invoice<span style="color:#F5A623">-IQ</span></h4>
    <p class="text-muted mb-4">Accounts Payable · {{ finance_system_name }}</p>

    {% if error %}
    <div class="alert alert-danger small py-2">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('login') }}">
      <div class="mb-3 text-start">
        <label class="form-label fw-semibold small">Email</label>
        <input type="email" class="form-control" name="email" autocomplete="email" placeholder="you@company.com"
               value="{{ request.form.get('email', '') }}" required autofocus>
      </div>
      <div class="mb-3 text-start">
        <label class="form-label fw-semibold small">Password</label>
        <input type="password" class="form-control" name="password" autocomplete="current-password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">
        Sign In <i class="bi bi-arrow-right ms-1"></i>
      </button>
      <div class="mt-3">
        <a href="{{ url_for('forgot_password') }}" class="small text-decoration-none">Forgot password?</a>
      </div>
    </form>
    <p class="mt-4 mb-0 text-muted" style="font-size:0.75rem;">
      Invoice-IQ is part of the Sol-IQ suite of business tools.
      <a href="https://sol-iq.co.uk?utm_source=invoice-iq" style="color:#C2410C;text-decoration:none;">Explore the rest →</a>
    </p>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
